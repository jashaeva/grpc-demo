syntax = "proto3";
import "google/protobuf/empty.proto";
import "validate/validate.proto";

package omsu.grpc;

option java_package = "omsu.grpc";
option java_outer_classname = "InventoryProto";
option java_multiple_files = true;

service InventoryCRUD {
  rpc CreateInventory (CreateRequest) returns (IdMessage) {}
  rpc editInventory (InventoryData) returns (google.protobuf.Empty) {}
  rpc getInventory (IdMessage) returns (InventoryData) {}
  rpc deleteInventory (IdMessage) returns (google.protobuf.Empty) {}
}

message CreateRequest {
  string name = 1 [(validate.rules).string = {min_len: 1, max_len: 100}];
  int64 count = 2 [(validate.rules).int64.gte = 1];

}

message IdMessage {
  string id = 1 [(validate.rules).string.uuid = true];
}

message InventoryData {
  string id = 1   [(validate.rules).string.uuid = true];
  string name = 2 [(validate.rules).string = {min_len: 1, max_len: 100}];
  int64 count = 3 [(validate.rules).int64.gte = 1];
}