name: PR Validation

on:
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run tests from omsu package
        run: ./gradlew test --tests "omsu.*" --no-daemon

      - name: Install Allure 2.34.0
        run: |
          wget https://github.com/allure-framework/allure2/releases/download/2.34.0/allure-2.34.0.tgz
          tar -xvzf allure-2.34.0.tgz -C /opt/
          sudo ln -s /opt/allure-2.34.0/bin/allure /usr/local/bin/allure

      - name: Generate Allure report
        run: |
          chmod +x report-allure-fix.sh
          # Заменяем "allure open" на echo для CI
          sed -i 's/allure open.*/echo "Report ready at build\/reports\/allure-aggregated"/' report-allure.sh
          ./report-allure.sh

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: build/reports/allure-aggregated