name: PR Validation

on:
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      # ========== КЕШИРОВАНИЕ GRADLE ==========
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission
        run: chmod +x gradlew

      # ========== КЕШИРОВАНИЕ DOCKER (Testcontainers) ==========
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-docker-${{ hashFiles('**/build.gradle') }}
          restore-keys: |
            ${{ runner.os }}-docker-         

      # ========== ЗАПУСК ТЕСТОВ ==========
      - name: Run tests from omsu package
        run: ./gradlew test --tests "omsu.*" --no-daemon

      # ========== ALLURE ОТЧЁТ ==========
      - name: Install Allure 2.34.0
        run: |
          wget https://github.com/allure-framework/allure2/releases/download/2.34.0/allure-2.34.0.tgz
          tar -xvzf allure-2.34.0.tgz -C /opt/
          sudo ln -s /opt/allure-2.34.0/bin/allure /usr/local/bin/allure

      - name: Generate Allure report
        run: |
          chmod +x report-allure.sh
          sed -i 's/allure open.*/echo "Report ready at build\/reports\/allure-aggregated"/' report-allure.sh
          ./report-allure.sh

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-report
          path: build/reports/allure-aggregated

      # ========== ОЧИСТКА ПОСЛЕ ТЕСТОВ ==========
      - name: Cleanup Docker containers
        if: always()
        run: docker system prune -f