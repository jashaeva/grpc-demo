logging:
  file:
    name: "server.log"
  level:
    root: INFO
    omsu: INFO
    com.zaxxer.hikari: INFO
  pattern:
    console: "%d{HH:mm:ss} %-5level %logger{20} - %msg%n"
    file: "%d [%thread] %-5level %logger{35} - %msg%n"
grpc:
  server:
    in-process-name: test-server
    port: -1
  client:
    test-server:
      address: in-process:test-server
      negotiation-type: PLAINTEXT  # <-- Это ключевой параметр
      # ИЛИ для явного отключения TLS:
      security:
        enabled: false