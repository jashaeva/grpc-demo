logging:
  file:
    name: "server.log"
  level:
    root: INFO
    omsu: INFO
    com.zaxxer.hikari: INFO
  pattern:
    console: "%d{HH:mm:ss} %-5level %logger{20} - %msg%n"
    file: "%d [%thread] %-5level %logger{35} - %msg%n"
grpc:
  server:
    in-process-name: test-server
    port: -1
  client:
    test-server:
      address: in-process:test-server
      negotiation-type: PLAINTEXT  # <-- Это ключевой параметр
      # ИЛИ для явного отключения TLS:
      security:
        enabled: false
spring:
  testcontainers:
    enabled: false
  datasource:
    # Включаем режим совместимости, чтобы H2 понимал PostgreSQL-синтаксис
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  # Настройки Flyway для тестов
  flyway:
    enabled: true                     # Включаем Flyway
    locations: classpath:db/migration/h2 # Здесь лежат ваши миграции

  # Отключаем автогенерацию схемы (она нам не нужна)
  jpa:
    generate-ddl: false
    hibernate:
      ddl-auto: none
