grpc:
  server:
    port: 9090
    # address: 0.0.0.0  # слушать все интерфейсы
  advice:
    exception-handling:
      enabled: true
      base-packages: omsu.inventory.exception
      ignored-exception-types:
        - io.grpc.StatusRuntimeException

spring:
  application:
    name: inventory-service
  datasource:
    url: jdbc:postgresql://localhost:5437/inventorydb
    username: postgres
    password: secret
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    schemas: inventory_schema
